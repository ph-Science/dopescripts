<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dope | RBX</title>
<link rel="icon" type="image/x-icon" href="lulwut.ico">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#080808;
--s1:#0d0d0d;
--s2:#141414;
--l1:#1a1a1a;
--l2:#242424;
--fg:#f0f0f0;
--d1:#555;
--d2:#888;
--g:#1dba6a;
--y:#c9a030;
--b:#4080d0;
--r:#c03020;
}
html,body{min-height:100vh;background:var(--bg);color:var(--fg);font-family:'Geist',sans-serif;overflow-x:hidden;}
button{font-family:'Geist',sans-serif;cursor:pointer;border:none;background:none;}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:none}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes blink{0%,100%{opacity:1}45%,55%{opacity:0.1}}
@keyframes rowIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:none}}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes g1{0%,93%,100%{transform:none}94%{transform:translate(-2px,1px)}96%{transform:translate(2px,-1px)}98%{transform:none}}
@keyframes g2{0%,93%,100%{clip-path:none}94%{clip-path:polygon(0 18%,100% 18%,100% 38%,0 38%);transform:translateX(3px)}96%{clip-path:polygon(0 62%,100% 62%,100% 82%,0 82%);transform:translateX(-3px)}98%{clip-path:none}}
@keyframes tabSlide{
  from{opacity:0;transform:translateY(-6px)}
  to{opacity:1;transform:none}
}
@keyframes indicatorIn{
  from{opacity:0;transform:scaleX(0)}
  to{opacity:1;transform:scaleX(1)}
}

.topbar{
  display:flex;justify-content:center;
  padding:36px 0 0;
  animation:tabSlide 0.5s cubic-bezier(0.22,1,0.36,1) both;
}
.tabs{
  display:flex;align-items:center;gap:2px;
  background:var(--s1);
  border:1px solid var(--l1);
  border-radius:10px;
  padding:4px;
}
.tab{
  position:relative;
  color:var(--d2);font-size:12px;font-weight:500;
  padding:8px 20px;border-radius:7px;
  transition:color 0.2s;
  letter-spacing:0.01em;
  z-index:1;
}
.tab:hover{color:var(--fg);}
.tab.on{color:var(--fg);}
.tab-bg{
  position:absolute;inset:0;border-radius:7px;
  background:var(--l1);
  opacity:0;
  transition:opacity 0.2s;
  z-index:-1;
}
.tab.on .tab-bg{opacity:1;}
.tab-dot{
  display:inline-block;
  width:4px;height:4px;border-radius:50%;
  background:var(--g);
  margin-left:6px;vertical-align:middle;
  opacity:0;transition:opacity 0.2s;
  animation:blink 2.5s infinite;
}
.tab.on .tab-dot{opacity:1;}

.wrap{max-width:800px;margin:0 auto;padding:0 44px 120px;}
.page{display:none;}
.page.on{display:block;animation:pageIn 0.3s cubic-bezier(0.22,1,0.36,1) both;}

.hero{padding:72px 0 52px;}
.hero-pre{
  font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--d1);margin-bottom:24px;
  animation:fadeUp 0.5s 0.05s cubic-bezier(0.22,1,0.36,1) both;
}
.hero-h{
  font-size:96px;font-weight:800;letter-spacing:-0.06em;line-height:0.9;
  animation:fadeUp 0.5s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  position:relative;display:inline-block;color:var(--fg);
}
.hero-h::before{
  content:attr(data-text);position:absolute;inset:0;color:var(--fg);
  animation:g1 10s infinite,g2 10s infinite;
}
.hero-ico{
  display:block;width:32px;height:32px;margin-top:24px;
  image-rendering:pixelated;opacity:0.5;
  animation:fadeUp 0.5s 0.15s cubic-bezier(0.22,1,0.36,1) both;
}
.hero-btns{
  display:flex;gap:8px;margin-top:28px;
  animation:fadeUp 0.5s 0.2s cubic-bezier(0.22,1,0.36,1) both;
}
.btn{
  padding:10px 20px;border-radius:7px;font-size:12px;font-weight:600;
  letter-spacing:0.01em;transition:all 0.18s;
}
.btn:active{transform:scale(0.97);}
.btn-solid{background:var(--fg);color:var(--bg);}
.btn-solid:hover{opacity:0.88;}
.btn-outline{background:transparent;color:var(--d2);border:1px solid var(--l2);}
.btn-outline:hover{color:var(--fg);border-color:var(--d1);}

.stat{
  padding:28px 0;border-top:1px solid var(--l1);
  animation:fadeUp 0.5s 0.25s cubic-bezier(0.22,1,0.36,1) both;
}
.stat-n{
  font-size:52px;font-weight:800;letter-spacing:-0.04em;line-height:1;
  margin-bottom:6px;transition:letter-spacing 0.3s;
}
.stat:hover .stat-n{letter-spacing:-0.02em;}
.stat-l{
  font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--d1);
}

.sec{display:flex;align-items:baseline;justify-content:space-between;padding:40px 0 20px;}
.sec h2{font-size:24px;font-weight:700;letter-spacing:-0.03em;}
.sec-tag{
  font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--d1);
}

.divider{height:1px;background:var(--l1);}

.script{
  display:flex;align-items:center;gap:14px;
  padding:18px 0;border-bottom:1px solid var(--l1);
  transition:padding-left 0.2s cubic-bezier(0.22,1,0.36,1);
  animation:fadeUp 0.35s cubic-bezier(0.22,1,0.36,1) both;
}
.script:nth-child(1){animation-delay:0.05s;}
.script:nth-child(2){animation-delay:0.1s;}
.script:hover{padding-left:6px;}
.script-n{
  font-family:'Geist Mono',monospace;font-size:10px;color:var(--d1);min-width:22px;
}
.script-info{flex:1;}
.script-title{font-size:15px;font-weight:600;letter-spacing:-0.01em;margin-bottom:4px;}
.online{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Geist Mono',monospace;font-size:9px;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--g);
}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 2.5s infinite;}
.sbtns{display:flex;gap:7px;flex-shrink:0;}
.sbtn{
  padding:7px 14px;border-radius:6px;font-size:10px;font-weight:600;
  letter-spacing:0.02em;transition:all 0.18s;
}
.sbtn:active{transform:scale(0.96);}
.sbtn-c{background:var(--fg);color:var(--bg);}
.sbtn-c:hover{opacity:0.85;}
.sbtn-c.ok{background:var(--g);color:#000;}
.sbtn-g{background:transparent;color:var(--d2);border:1px solid var(--l2);}
.sbtn-g:hover{color:var(--fg);border-color:var(--d1);}

.filters{
  display:flex;gap:5px;padding:16px 0;
  border-bottom:1px solid var(--l1);flex-wrap:wrap;
}
.f{
  padding:4px 12px;border-radius:100px;font-size:10px;
  font-family:'Geist Mono',monospace;
  border:1px solid var(--l2);background:transparent;
  color:var(--d2);transition:all 0.18s;
}
.f:hover{color:var(--fg);border-color:var(--d1);}
.f.on{background:var(--fg);color:var(--bg);border-color:var(--fg);}

.etable{width:100%;border-collapse:collapse;}
.etable th{
  font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--d1);
  padding:10px 0 10px;border-bottom:1px solid var(--l2);
  text-align:left;font-weight:400;
}
.etable td{
  padding:13px 0;border-bottom:1px solid var(--l1);
  font-size:13px;vertical-align:middle;
}
.etable tbody tr{
  opacity:0;animation:rowIn 0.2s ease forwards;
  transition:background 0.15s;
}
.en{font-weight:600;letter-spacing:-0.01em;margin-bottom:2px;}
.esub{font-family:'Geist Mono',monospace;font-size:9px;color:var(--d1);}
.chip{
  display:inline-flex;align-items:center;
  padding:2px 7px;border-radius:3px;
  font-family:'Geist Mono',monospace;font-size:9px;font-weight:600;
}
.cf{background:rgba(29,186,106,0.08);color:var(--g);}
.cp{background:rgba(201,160,48,0.08);color:var(--y);}
.cs{background:rgba(29,186,106,0.08);color:var(--g);}
.cd{background:rgba(192,48,32,0.08);color:var(--r);}
.cu{background:rgba(64,128,208,0.08);color:var(--b);}
.co{background:rgba(192,48,32,0.08);color:var(--r);}
.unc{font-family:'Geist Mono',monospace;font-size:10px;color:var(--d2);}
.unc b{color:var(--fg);}

.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px;}
.vcard{
  background:var(--s1);border:1px solid var(--l1);
  border-radius:8px;padding:18px;
  transition:border-color 0.2s,transform 0.2s;
  animation:fadeUp 0.3s cubic-bezier(0.22,1,0.36,1) both;
}
.vcard:nth-child(2){animation-delay:0.07s;}
.vcard:nth-child(3){animation-delay:0.14s;}
.vcard:hover{border-color:var(--l2);transform:translateY(-1px);}
.vcard-h{
  font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--d1);margin-bottom:12px;
}
.vrow{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:8px 0;border-bottom:1px solid var(--l1);
}
.vrow:last-child{border-bottom:none;}
.vplat{font-size:13px;font-weight:600;}
.vdate{font-family:'Geist Mono',monospace;font-size:9px;color:var(--d1);margin-top:2px;}
.vver{font-family:'Geist Mono',monospace;font-size:9px;color:var(--d2);text-align:right;max-width:170px;word-break:break-all;}

.msg{padding:48px 0;text-align:center;font-family:'Geist Mono',monospace;font-size:10px;color:var(--d1);}
.merr{color:var(--r);}

.toast{
  position:fixed;bottom:22px;right:22px;
  background:var(--fg);color:var(--bg);
  font-family:'Geist Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:0.2em;text-transform:uppercase;
  padding:10px 18px;border-radius:6px;z-index:9999;pointer-events:none;
  opacity:0;transform:translateY(10px) scale(0.95);
  transition:all 0.22s cubic-bezier(0.34,1.4,0.64,1);
}
.toast.show{opacity:1;transform:none;}

@media(max-width:580px){
  .wrap{padding:0 22px 80px;}
  .hero-h{font-size:60px;}
  .vgrid{grid-template-columns:1fr;}
  .tab{padding:8px 14px;font-size:11px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tabs">
    <button class="tab on" onclick="go('home',this)">
      <span class="tab-bg"></span>Home<span class="tab-dot"></span>
    </button>
    <button class="tab" onclick="go('scripts',this)">
      <span class="tab-bg"></span>Scripts
    </button>
    <button class="tab" onclick="go('executors',this)">
      <span class="tab-bg"></span>Executors
    </button>
    <button class="tab" onclick="go('roblox',this)">
      <span class="tab-bg"></span>Roblox
    </button>
  </div>
</div>

<div class="wrap">

  <div id="home" class="page on">
    <div class="hero">
      <h1 class="hero-h" data-text="dope">dope</h1>
      <img src="kitty.jpg" class="hero-ico" alt="">
            <img src="catem.png" class="hero-ico" alt="">
      <div class="hero-btns">
        <button class="btn btn-solid" onclick="go('scripts',document.querySelectorAll('.tab')[1])">View Scripts</button>
        <button class="btn btn-outline" onclick="go('executors',document.querySelectorAll('.tab')[2])">Executors</button>
      </div>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <div class="stat-n">2</div>
      <div class="stat-l">Scripts Active</div>
    </div>
  </div>

  <div id="scripts" class="page">
    <div class="sec"><h2>Scripts</h2><span class="sec-tag">2 active</span></div>
    <div class="divider"></div>
    <div class="script">
      <div class="script-n">01</div>
      <div class="script-info">
        <div class="script-title">Murder Drones RP</div>
        <span class="online"><span class="dot"></span>online</span>
      </div>
      <div class="sbtns">
        <button class="sbtn sbtn-c" onclick="cp(this,'loadstring(game:HttpGet(&quot;https://dopescripts.vercel.app/murderdronesrp.lua&quot;))()')">Copy</button>
        <button class="sbtn sbtn-g" onclick="window.open('https://www.roblox.com/games/11451679682','_blank')">Game ↗</button>
      </div>
    </div>
    <div class="script">
      <div class="script-n">02</div>
      <div class="script-info">
        <div class="script-title">Eat Jelly For Brainrots</div>
        <span class="online"><span class="dot"></span>online</span>
      </div>
      <div class="sbtns">
        <button class="sbtn sbtn-c" onclick="cp(this,'loadstring(game:HttpGet(&quot;https://dopescripts.vercel.app/eatjellyforbrainrots.lua&quot;))()')">Copy</button>
        <button class="sbtn sbtn-g" onclick="window.open('https://www.roblox.com/games/96169782836983','_blank')">Game ↗</button>
      </div>
    </div>
  </div>

  <div id="executors" class="page">
    <div class="sec"><h2>Executors</h2><span class="sec-tag">Live</span></div>
    <div class="divider"></div>
    <div class="filters">
      <button class="f on" onclick="filt('all',this)">All</button>
      <button class="f" onclick="filt('free',this)">Free</button>
      <button class="f" onclick="filt('paid',this)">Paid</button>
      <button class="f" onclick="filt('undetected',this)">Undetected</button>
      <button class="f" onclick="filt('updated',this)">Updated</button>
    </div>
    <table class="etable">
      <thead>
        <tr>
          <th style="width:28px">#</th>
          <th>Name</th>
          <th style="width:70px">Price</th>
          <th style="width:80px">Detection</th>
          <th style="width:80px">Status</th>
          <th style="width:70px">UNC</th>
        </tr>
      </thead>
      <tbody id="exec-body"><tr><td colspan="6"><div class="msg">Fetching...</div></td></tr></tbody>
    </table>
  </div>

  <div id="roblox" class="page">
    <div class="sec"><h2>Roblox Versions</h2><span class="sec-tag">Live</span></div>
    <div class="divider"></div>
    <div id="rbx-body"><div class="msg">Fetching...</div></div>
  </div>

</div>

<div class="toast" id="toast">Copied</div>

<script>
function go(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  if(btn)btn.classList.add('on');
  if(id==='executors'&&!execLoaded)loadExecs();
  if(id==='roblox'&&!rbxLoaded)loadRbx();
}

function cp(btn,text){
  const s=text.replace(/&quot;/g,'"');
  navigator.clipboard?navigator.clipboard.writeText(s).catch(()=>fb(s)):fb(s);
  btn.textContent='Copied';btn.classList.add('ok');
  const t=document.getElementById('toast');t.classList.add('show');
  setTimeout(()=>{t.classList.remove('show');btn.textContent='Copy';btn.classList.remove('ok');},1800);
}

function fb(s){
  const ta=document.createElement('textarea');
  ta.value=s;ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta);ta.select();
  document.execCommand('copy');document.body.removeChild(ta);
}

let execData=[],execLoaded=false,curFilt='all';

async function loadExecs(){
  execLoaded=true;
  try{
    const r=await fetch('https://weao.xyz/api/status/exploits',{headers:{'User-Agent':'WEAO-3PService'}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    execData=await r.json();
    renderExecs();
  }catch(e){
    document.getElementById('exec-body').innerHTML=`<tr><td colspan="6"><div class="msg merr">Failed — ${e.message}</div></td></tr>`;
  }
}

function renderExecs(){
  let d=[...execData];
  if(curFilt==='free')d=d.filter(e=>e.free);
  if(curFilt==='paid')d=d.filter(e=>!e.free);
  if(curFilt==='undetected')d=d.filter(e=>!e.detected);
  if(curFilt==='updated')d=d.filter(e=>e.updateStatus);
  if(!d.length){document.getElementById('exec-body').innerHTML='<tr><td colspan="6"><div class="msg">No results.</div></td></tr>';return;}
  document.getElementById('exec-body').innerHTML=d.map((e,i)=>`
    <tr style="animation-delay:${i*0.025}s">
      <td style="font-family:'Geist Mono',monospace;font-size:9px;color:var(--d1)">${i+1}</td>
      <td><div class="en">${e.title}</div><div class="esub">${[e.platform,e.version].filter(Boolean).join(' · ')}</div></td>
      <td>${e.free?'<span class="chip cf">Free</span>':`<span class="chip cp">${e.cost||'Paid'}</span>`}</td>
      <td>${e.detected?'<span class="chip cd">Detected</span>':'<span class="chip cs">Safe</span>'}</td>
      <td>${e.updateStatus?'<span class="chip cu">Updated</span>':'<span class="chip co">Outdated</span>'}</td>
      <td class="unc">${e.uncPercentage!=null?`<b>${e.uncPercentage}</b>%`:'—'}</td>
    </tr>`).join('');
}

function filt(f,btn){
  curFilt=f;
  document.querySelectorAll('.f').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(execLoaded&&execData.length)renderExecs();
}

let rbxLoaded=false;

async function loadRbx(){
  rbxLoaded=true;
  try{
    const [cur,fut,past]=await Promise.all([
      fetch('https://weao.xyz/api/versions/current',{headers:{'User-Agent':'WEAO-3PService'}}).then(r=>r.json()),
      fetch('https://weao.xyz/api/versions/future',{headers:{'User-Agent':'WEAO-3PService'}}).then(r=>r.json()),
      fetch('https://weao.xyz/api/versions/past',{headers:{'User-Agent':'WEAO-3PService'}}).then(r=>r.json()),
    ]);
    document.getElementById('rbx-body').innerHTML=`<div class="vgrid">
      ${vc('Current',[['Windows',cur.Windows,cur.WindowsDate],['Mac',cur.Mac,cur.MacDate],['Android',cur.Android,cur.AndroidDate],['iOS',cur.iOS,cur.iOSDate]])}
      ${vc('Future',[['Windows',fut.Windows,fut.WindowsDate],['Mac',fut.Mac,fut.MacDate]])}
      ${vc('Past',[['Windows',past.Windows,past.WindowsDate],['Mac',past.Mac,past.MacDate]])}
    </div>`;
  }catch(e){
    document.getElementById('rbx-body').innerHTML=`<div class="msg merr">Failed — ${e.message}</div>`;
  }
}

function vc(t,rows){
  return`<div class="vcard"><div class="vcard-h">${t}</div>${rows.map(([p,v,d])=>`
    <div class="vrow">
      <div><div class="vplat">${p}</div><div class="vdate">${d||'—'}</div></div>
      <div class="vver">${v||'—'}</div>
    </div>`).join('')}</div>`;
}
</script>
</body>
</html>
