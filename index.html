<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dope | RBX</title>
<link rel="icon" type="image/x-icon" href="lulwut.ico">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#060606;
--s1:#0c0c0c;
--s2:#111;
--l1:#181818;
--l2:#222;
--l3:#2a2a2a;
--fg:#efefef;
--d1:#444;
--d2:#777;
--d3:#999;
--g:#18c463;
--y:#c9a030;
--b:#4080d0;
--r:#c03020;
}
html,body{min-height:100vh;background:var(--bg);color:var(--fg);font-family:'Geist',sans-serif;overflow-x:hidden;}
button{font-family:'Geist',sans-serif;cursor:pointer;border:none;background:none;color:inherit;}
::selection{background:var(--g);color:#000;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}48%,52%{opacity:0}}
@keyframes rowIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.topbar{
  position:sticky;top:0;z-index:100;
  display:flex;justify-content:center;
  padding:24px 0;
  background:linear-gradient(var(--bg) 65%,transparent);
}
.tabs{
  display:flex;align-items:center;gap:1px;
  background:var(--s1);
  border:1px solid var(--l2);
  border-radius:12px;
  padding:4px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.03) inset;
}
.tab{
  position:relative;
  color:var(--d2);font-size:11.5px;font-weight:500;
  padding:8px 18px;border-radius:8px;
  transition:color 0.15s;
  letter-spacing:0.015em;
  z-index:1;white-space:nowrap;
}
.tab:hover{color:var(--d3);}
.tab.on{color:var(--fg);}
.tab-bg{
  position:absolute;inset:0;border-radius:8px;
  background:var(--l1);
  border:1px solid var(--l3);
  opacity:0;transition:opacity 0.15s;
  z-index:-1;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.tab.on .tab-bg{opacity:1;}
.tab-dot{
  display:inline-block;width:4px;height:4px;border-radius:50%;
  background:var(--g);margin-left:5px;vertical-align:middle;
  opacity:0;transition:opacity 0.15s;animation:blink 2s infinite;
}
.tab.on .tab-dot{opacity:1;}
.tab-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:14px;height:14px;border-radius:100px;
  background:var(--r);color:#fff;
  font-family:'Geist Mono',monospace;font-size:8px;font-weight:700;
  margin-left:5px;vertical-align:middle;padding:0 3px;
  opacity:0;transition:opacity 0.2s;
}
.tab-badge.show{opacity:1;}

.wrap{max-width:780px;margin:0 auto;padding:0 40px 120px;}
.page{display:none;}
.page.on{display:block;animation:pageIn 0.25s cubic-bezier(0.22,1,0.36,1) both;}

.hero{padding:56px 0 60px;}
.hero-h{
  font-size:112px;font-weight:900;letter-spacing:-0.065em;line-height:0.88;
  animation:fadeUp 0.5s 0.06s cubic-bezier(0.22,1,0.36,1) both;
  color:var(--fg);
}
.hero-icons{display:flex;gap:10px;align-items:center;}
.hero-ico{
  display:block;width:28px;height:28px;margin-top:22px;
  image-rendering:pixelated;opacity:0.32;
  animation:fadeUp 0.5s 0.12s cubic-bezier(0.22,1,0.36,1) both;
  transition:opacity 0.2s;
}
.hero-ico:hover{opacity:0.65;}
.hero-btns{
  display:flex;gap:8px;margin-top:30px;
  animation:fadeUp 0.5s 0.16s cubic-bezier(0.22,1,0.36,1) both;
}
.btn{padding:10px 22px;border-radius:8px;font-size:12px;font-weight:600;letter-spacing:0.01em;transition:all 0.15s;}
.btn:active{transform:scale(0.97);}
.btn-solid{background:var(--fg);color:var(--bg);}
.btn-solid:hover{opacity:0.88;}
.btn-outline{background:transparent;color:var(--d2);border:1px solid var(--l3);}
.btn-outline:hover{color:var(--fg);border-color:var(--d1);}

.divider{height:1px;background:var(--l1);}

.sec{display:flex;align-items:baseline;justify-content:space-between;padding:44px 0 20px;}
.sec h2{font-size:22px;font-weight:700;letter-spacing:-0.03em;}
.sec-tag{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--d1);}

.script-card{
  position:relative;
  display:flex;align-items:center;gap:16px;
  padding:18px 20px;margin-bottom:6px;
  border-radius:10px;
  border:1px solid var(--l1);
  background:var(--s1);
  transition:border-color 0.18s,transform 0.18s,background 0.18s;
  animation:cardIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
  overflow:hidden;
}
.script-card:nth-child(1){animation-delay:0.04s;}
.script-card:nth-child(2){animation-delay:0.09s;}
.script-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--g);opacity:0;transition:opacity 0.18s;
}
.script-card:hover{border-color:var(--l3);background:var(--s2);transform:translateX(2px);}
.script-card:hover::before{opacity:1;}
.script-num{font-family:'Geist Mono',monospace;font-size:9px;color:var(--d1);min-width:20px;flex-shrink:0;}
.script-info{flex:1;min-width:0;}
.script-title{font-size:14px;font-weight:600;letter-spacing:-0.01em;margin-bottom:5px;}
.online{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Geist Mono',monospace;font-size:8.5px;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--g);
}
.dot{width:4px;height:4px;border-radius:50%;background:currentColor;animation:blink 2s infinite;}
.sbtns{display:flex;gap:6px;flex-shrink:0;}
.sbtn{padding:7px 14px;border-radius:6px;font-size:10px;font-weight:600;letter-spacing:0.015em;transition:all 0.15s;}
.sbtn:active{transform:scale(0.95);}
.sbtn-c{background:var(--l2);color:var(--d3);border:1px solid var(--l3);}
.sbtn-c:hover{background:var(--l3);color:var(--fg);}
.sbtn-c.ok{background:var(--g);color:#000;border-color:var(--g);}
.sbtn-g{background:transparent;color:var(--d1);border:1px solid var(--l2);}
.sbtn-g:hover{color:var(--fg);border-color:var(--d1);}

.filters{display:flex;gap:5px;padding:16px 0;border-bottom:1px solid var(--l1);flex-wrap:wrap;}
.f{
  padding:5px 13px;border-radius:100px;font-size:10px;
  font-family:'Geist Mono',monospace;
  border:1px solid var(--l2);background:transparent;
  color:var(--d1);transition:all 0.15s;letter-spacing:0.04em;
}
.f:hover{color:var(--d3);border-color:var(--l3);}
.f.on{background:var(--fg);color:var(--bg);border-color:var(--fg);}

.etable{width:100%;border-collapse:collapse;}
.etable th{
  font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--d1);
  padding:12px 0;border-bottom:1px solid var(--l2);
  text-align:left;font-weight:400;
}
.etable td{padding:12px 0;border-bottom:1px solid var(--l1);font-size:13px;vertical-align:middle;}
.etable tbody tr{opacity:0;animation:rowIn 0.2s ease forwards;}
.etable tbody tr:hover td{background:transparent;}
.en{font-weight:600;letter-spacing:-0.01em;margin-bottom:2px;}
.esub{font-family:'Geist Mono',monospace;font-size:9px;color:var(--d1);}
.chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-family:'Geist Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.05em;}
.cf{background:rgba(24,196,99,0.07);color:var(--g);}
.cp{background:rgba(201,160,48,0.07);color:var(--y);}
.cs{background:rgba(24,196,99,0.07);color:var(--g);}
.cd{background:rgba(192,48,32,0.07);color:var(--r);}
.cu{background:rgba(64,128,208,0.07);color:var(--b);}
.co{background:rgba(192,48,32,0.07);color:var(--r);}
.unc{font-family:'Geist Mono',monospace;font-size:10px;color:var(--d2);}
.unc b{color:var(--fg);}

.plat-icon{width:14px;height:14px;object-fit:contain;opacity:0.6;vertical-align:middle;margin-right:5px;}

.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px;}
.vcard{
  background:var(--s1);border:1px solid var(--l1);
  border-radius:10px;padding:18px;
  transition:border-color 0.18s,transform 0.18s;
  animation:cardIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
}
.vcard:nth-child(2){animation-delay:0.06s;}
.vcard:nth-child(3){animation-delay:0.12s;}
.vcard:hover{border-color:var(--l3);transform:translateY(-1px);}
.vcard-h{
  font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--d1);margin-bottom:14px;
}
.vrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--l1);}
.vrow:last-child{border-bottom:none;}
.vrow-left{display:flex;align-items:center;gap:0;}
.vplat{font-size:13px;font-weight:600;}
.vdate{font-family:'Geist Mono',monospace;font-size:9px;color:var(--d1);margin-top:2px;}
.vver{font-family:'Geist Mono',monospace;font-size:9px;color:var(--d2);text-align:right;max-width:160px;word-break:break-all;}

.notif-section-label{
  font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.2em;
  text-transform:uppercase;color:var(--d1);padding:26px 0 10px;
}
.notif{
  display:flex;align-items:flex-start;gap:14px;
  padding:15px 18px;margin-bottom:6px;
  background:var(--s1);border:1px solid var(--l1);border-radius:10px;
  transition:border-color 0.18s,transform 0.18s;
  animation:cardIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
}
.notif:hover{border-color:var(--l3);transform:translateX(2px);}
.notif-icon{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.notif-icon img{width:14px;height:14px;object-fit:contain;opacity:0.8;}
.ni-update{background:rgba(64,128,208,0.1);}
.ni-detected{background:rgba(192,48,32,0.1);}
.ni-roblox{background:rgba(201,160,48,0.1);}
.notif-body{flex:1;}
.notif-title{font-size:13.5px;font-weight:600;letter-spacing:-0.01em;margin-bottom:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.notif-sub{font-family:'Geist Mono',monospace;font-size:9px;color:var(--d2);letter-spacing:0.04em;}
.notif-time{font-family:'Geist Mono',monospace;font-size:9px;color:var(--d1);flex-shrink:0;margin-top:3px;}
.notif-tag{font-family:'Geist Mono',monospace;font-size:8px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 6px;border-radius:3px;}
.nt-update{background:rgba(64,128,208,0.1);color:var(--b);}
.nt-detected{background:rgba(192,48,32,0.1);color:var(--r);}
.nt-roblox{background:rgba(201,160,48,0.1);color:var(--y);}

.msg{padding:52px 0;text-align:center;font-family:'Geist Mono',monospace;font-size:10px;color:var(--d1);}
.merr{color:var(--r);}

.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(16px) scale(0.95);
  background:var(--fg);color:var(--bg);
  font-family:'Geist Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:0.2em;text-transform:uppercase;
  padding:10px 20px;border-radius:8px;z-index:9999;pointer-events:none;
  opacity:0;transition:all 0.2s cubic-bezier(0.34,1.4,0.64,1);
  white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}

@media(max-width:580px){
  .wrap{padding:0 20px 80px;}
  .hero-h{font-size:72px;}
  .vgrid{grid-template-columns:1fr;}
  .tab{padding:7px 12px;font-size:11px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tabs">
    <button class="tab on" onclick="go('home',this)">
      <span class="tab-bg"></span>Home<span class="tab-dot"></span>
    </button>
    <button class="tab" onclick="go('scripts',this)">
      <span class="tab-bg"></span>Scripts
    </button>
    <button class="tab" onclick="go('executors',this)">
      <span class="tab-bg"></span>Executors
    </button>
    <button class="tab" onclick="go('roblox',this)">
      <span class="tab-bg"></span>Roblox
    </button>
    <button class="tab" id="notif-tab" onclick="go('notifications',this)">
      <span class="tab-bg"></span>Inbox<span class="tab-badge" id="notif-badge"></span>
    </button>
  </div>
</div>

<div class="wrap">

  <div id="home" class="page on">
    <div class="hero">
      <h1 class="hero-h">dope</h1>
      <div class="hero-icons">
        <img src="kitty.jpg" class="hero-ico" alt="">
        <img src="catem.png" class="hero-ico" alt="">
      </div>
      <div class="hero-btns">
        <button class="btn btn-solid" onclick="go('scripts',document.querySelectorAll('.tab')[1])">View Scripts</button>
        <button class="btn btn-outline" onclick="go('executors',document.querySelectorAll('.tab')[2])">Executors</button>
      </div>
    </div>
  </div>

  <div id="scripts" class="page">
    <div class="sec"><h2>Scripts</h2><span class="sec-tag">2 available</span></div>
    <div class="divider" style="margin-bottom:16px;"></div>
    <div class="script-card">
      <div class="script-num">01</div>
      <div class="script-info">
        <div class="script-title">Murder Drones RP</div>
        <span class="online"><span class="dot"></span>online</span>
      </div>
      <div class="sbtns">
        <button class="sbtn sbtn-c" onclick="cp(this,'loadstring(game:HttpGet(&quot;https://dopescripts.vercel.app/murderdronesrp.lua&quot;))()')">Copy</button>
        <button class="sbtn sbtn-g" onclick="window.open('https://www.roblox.com/games/11451679682','_blank')">Game ↗</button>
      </div>
    </div>
    <div class="script-card">
      <div class="script-num">02</div>
      <div class="script-info">
        <div class="script-title">Eat Jelly For Brainrots</div>
        <span class="online"><span class="dot"></span>online</span>
      </div>
      <div class="sbtns">
        <button class="sbtn sbtn-c" onclick="cp(this,'loadstring(game:HttpGet(&quot;https://dopescripts.vercel.app/eatjellyforbrainrots.lua&quot;))()')">Copy</button>
        <button class="sbtn sbtn-g" onclick="window.open('https://www.roblox.com/games/96169782836983','_blank')">Game ↗</button>
      </div>
    </div>
  </div>

  <div id="executors" class="page">
    <div class="sec"><h2>Executors</h2><span class="sec-tag">Live</span></div>
    <div class="divider"></div>
    <div class="filters">
      <button class="f on" onclick="filt('all',this)">All</button>
      <button class="f" onclick="filt('free',this)">Free</button>
      <button class="f" onclick="filt('paid',this)">Paid</button>
      <button class="f" onclick="filt('undetected',this)">Undetected</button>
      <button class="f" onclick="filt('updated',this)">Updated</button>
    </div>
    <table class="etable">
      <thead>
        <tr>
          <th style="width:28px">#</th>
          <th>Name</th>
          <th style="width:70px">Price</th>
          <th style="width:80px">Detection</th>
          <th style="width:80px">Status</th>
          <th style="width:60px">UNC</th>
        </tr>
      </thead>
      <tbody id="exec-body"><tr><td colspan="6"><div class="msg">Fetching...</div></td></tr></tbody>
    </table>
  </div>

  <div id="roblox" class="page">
    <div class="sec"><h2>Roblox Versions</h2><span class="sec-tag">Live</span></div>
    <div class="divider"></div>
    <div id="rbx-body"><div class="msg">Fetching...</div></div>
  </div>

  <div id="notifications" class="page">
    <div class="sec"><h2>Inbox</h2><span class="sec-tag" id="notif-count">Loading...</span></div>
    <div class="divider"></div>
    <div id="notif-body"><div class="msg">Fetching...</div></div>
  </div>

</div>

<div class="toast" id="toast">Copied</div>

<script>
const PLAT_ICONS={
  Windows:'win.png',
  Mac:'mac.png',
  Android:'android.png',
  iOS:'ios.png',
};

function platIcon(name){
  const src=PLAT_ICONS[name];
  if(!src)return'';
  return`<img src="${src}" class="plat-icon" alt="${name}">`;
}

function go(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  if(btn)btn.classList.add('on');
  if(id==='executors'&&!execLoaded)loadExecs();
  if(id==='roblox'&&!rbxLoaded)loadRbx();
  if(id==='notifications'){
    const badge=document.getElementById('notif-badge');
    badge.textContent='';badge.classList.remove('show');
    if(!notifLoaded)loadNotifs();
  }
}

function cp(btn,text){
  const s=text.replace(/&quot;/g,'"');
  navigator.clipboard?navigator.clipboard.writeText(s).catch(()=>fb(s)):fb(s);
  btn.textContent='Copied';btn.classList.add('ok');
  const t=document.getElementById('toast');t.classList.add('show');
  setTimeout(()=>{t.classList.remove('show');btn.textContent='Copy';btn.classList.remove('ok');},1800);
}

function fb(s){
  const ta=document.createElement('textarea');
  ta.value=s;ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta);ta.select();
  document.execCommand('copy');document.body.removeChild(ta);
}

let execData=[],execLoaded=false,curFilt='all';

async function loadExecs(){
  execLoaded=true;
  try{
    const r=await fetch('https://weao.xyz/api/status/exploits',{headers:{'User-Agent':'WEAO-3PService'}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    execData=await r.json();
    renderExecs();
    buildNotifs();
  }catch(e){
    document.getElementById('exec-body').innerHTML=`<tr><td colspan="6"><div class="msg merr">Failed — ${e.message}</div></td></tr>`;
  }
}

function renderExecs(){
  let d=[...execData];
  if(curFilt==='free')d=d.filter(e=>e.free);
  if(curFilt==='paid')d=d.filter(e=>!e.free);
  if(curFilt==='undetected')d=d.filter(e=>!e.detected);
  if(curFilt==='updated')d=d.filter(e=>e.updateStatus);
  if(!d.length){document.getElementById('exec-body').innerHTML='<tr><td colspan="6"><div class="msg">No results.</div></td></tr>';return;}
  document.getElementById('exec-body').innerHTML=d.map((e,i)=>`
    <tr style="animation-delay:${i*0.02}s">
      <td style="font-family:'Geist Mono',monospace;font-size:9px;color:var(--d1)">${i+1}</td>
      <td>
        <div class="en">${e.title}</div>
        <div class="esub">${e.platform?`${platIcon(e.platform)}${e.platform}`:''}${e.version?` · ${e.version}`:''}</div>
      </td>
      <td>${e.free?'<span class="chip cf">Free</span>':`<span class="chip cp">${e.cost||'Paid'}</span>`}</td>
      <td>${e.detected?'<span class="chip cd">Detected</span>':'<span class="chip cs">Safe</span>'}</td>
      <td>${e.updateStatus?'<span class="chip cu">Updated</span>':'<span class="chip co">Outdated</span>'}</td>
      <td class="unc">${e.uncPercentage!=null?`<b>${e.uncPercentage}</b>%`:'—'}</td>
    </tr>`).join('');
}

function filt(f,btn){
  curFilt=f;
  document.querySelectorAll('.f').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(execLoaded&&execData.length)renderExecs();
}

let rbxLoaded=false,rbxData=null;

async function loadRbx(){
  rbxLoaded=true;
  try{
    const [cur,fut,past]=await Promise.all([
      fetch('https://weao.xyz/api/versions/current',{headers:{'User-Agent':'WEAO-3PService'}}).then(r=>r.json()),
      fetch('https://weao.xyz/api/versions/future',{headers:{'User-Agent':'WEAO-3PService'}}).then(r=>r.json()),
      fetch('https://weao.xyz/api/versions/past',{headers:{'User-Agent':'WEAO-3PService'}}).then(r=>r.json()),
    ]);
    rbxData={cur,fut,past};
    document.getElementById('rbx-body').innerHTML=`<div class="vgrid">
      ${vc('Current',[['Windows',cur.Windows,cur.WindowsDate],['Mac',cur.Mac,cur.MacDate],['Android',cur.Android,cur.AndroidDate],['iOS',cur.iOS,cur.iOSDate]])}
      ${vc('Future',[['Windows',fut.Windows,fut.WindowsDate],['Mac',fut.Mac,fut.MacDate]])}
      ${vc('Past',[['Windows',past.Windows,past.WindowsDate],['Mac',past.Mac,past.MacDate]])}
    </div>`;
    buildNotifs();
  }catch(e){
    document.getElementById('rbx-body').innerHTML=`<div class="msg merr">Failed — ${e.message}</div>`;
  }
}

function vc(t,rows){
  return`<div class="vcard"><div class="vcard-h">${t}</div>${rows.map(([p,v,d])=>`
    <div class="vrow">
      <div class="vrow-left">
        ${platIcon(p)}<div><div class="vplat">${p}</div><div class="vdate">${d||'—'}</div></div>
      </div>
      <div class="vver">${v||'—'}</div>
    </div>`).join('')}</div>`;
}

let notifLoaded=false;

window.addEventListener('load',()=>{
  if(!execLoaded)loadExecs();
  if(!rbxLoaded)loadRbx();
});

function buildNotifs(){
  const hasExec=execLoaded&&execData.length>0;
  const hasRbx=rbxLoaded&&rbxData;
  if(!hasExec&&!hasRbx)return;
  const notifs=[];
  if(hasExec){
    execData.filter(e=>e.detected).forEach(e=>{
      notifs.push({type:'detected',iconSrc:'win.png',iconClass:'ni-detected',tag:'Detected',tagClass:'nt-detected',title:e.title,sub:`Flagged · ${e.platform||'Unknown'}`,time:'Live',category:'executor',platform:e.platform});
    });
    execData.filter(e=>e.updateStatus).forEach(e=>{
      notifs.push({type:'update',iconSrc:PLAT_ICONS[e.platform]||null,iconClass:'ni-update',tag:'Updated',tagClass:'nt-update',title:e.title,sub:`${e.version||'Latest'} · ${e.platform||'Unknown'}`,time:'Live',category:'executor',platform:e.platform});
    });
  }
  if(hasRbx){
    const{cur,fut}=rbxData;
    if(cur.Windows)notifs.push({type:'roblox',iconSrc:'win.png',iconClass:'ni-roblox',tag:'Roblox',tagClass:'nt-roblox',title:'Windows Client',sub:`${cur.Windows} · ${cur.WindowsDate||'—'}`,time:'Live',category:'roblox'});
    if(cur.Mac)notifs.push({type:'roblox',iconSrc:'mac.png',iconClass:'ni-roblox',tag:'Roblox',tagClass:'nt-roblox',title:'Mac Client',sub:`${cur.Mac} · ${cur.MacDate||'—'}`,time:'Live',category:'roblox'});
    if(fut.Windows)notifs.push({type:'update',iconSrc:'win.png',iconClass:'ni-update',tag:'Incoming',tagClass:'nt-update',title:'Future Windows Build',sub:`${fut.Windows} · ${fut.WindowsDate||'—'}`,time:'Live',category:'roblox'});
  }
  if(!notifs.length){
    document.getElementById('notif-body').innerHTML='<div class="msg">Nothing here yet.</div>';
    document.getElementById('notif-count').textContent='0 items';
    return;
  }
  const badge=document.getElementById('notif-badge');
  const detected=notifs.filter(n=>n.type==='detected').length;
  if(detected>0){badge.textContent=detected;badge.classList.add('show');}
  document.getElementById('notif-count').textContent=`${notifs.length} items`;
  const rbxNotifs=notifs.filter(n=>n.category==='roblox');
  const execNotifs=notifs.filter(n=>n.category==='executor');
  let html='';
  if(rbxNotifs.length){html+=`<div class="notif-section-label">Roblox</div>`;rbxNotifs.forEach((n,i)=>{html+=notifRow(n,i);});}
  if(execNotifs.length){html+=`<div class="notif-section-label">Executors</div>`;execNotifs.forEach((n,i)=>{html+=notifRow(n,i+rbxNotifs.length);});}
  document.getElementById('notif-body').innerHTML=html;
  notifLoaded=true;
}

function notifRow(n,i){
  const iconContent=n.iconSrc?`<img src="${n.iconSrc}" alt="" style="width:14px;height:14px;object-fit:contain;opacity:0.75;">`:'';
  return`<div class="notif" style="animation-delay:${i*0.035}s">
    <div class="notif-icon ${n.iconClass}">${iconContent}</div>
    <div class="notif-body">
      <div class="notif-title">${n.title}<span class="notif-tag ${n.tagClass}">${n.tag}</span></div>
      <div class="notif-sub">${n.sub}</div>
    </div>
    <div class="notif-time">${n.time}</div>
  </div>`;
}

function loadNotifs(){
  notifLoaded=true;
  if(execLoaded&&rbxLoaded){buildNotifs();}
  else{
    document.getElementById('notif-body').innerHTML='<div class="msg">Fetching...</div>';
    const check=setInterval(()=>{if(execLoaded&&rbxLoaded){clearInterval(check);buildNotifs();}},400);
  }
}
</script>
