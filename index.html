<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dope | RBX</title>
<link rel="icon" type="image/x-icon" href="lulwut.ico">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Braah+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08090a;
  --s1:#0d0e10;
  --s2:#111315;
  --l1:#1a1c1f;
  --l2:#222528;
  --l3:#2c3035;
  --fg:#f0ede8;
  --fg2:#b8b4ae;
  --fg3:#6e6b66;
  --fg4:#3a3835;
  --accent:#c8f53c;
  --accent-dim:#8aaa1a;
  --red:#f5432a;
  --amber:#e8a820;
  --blue:#4a8fef;
  --green:#3dd68c;
  --mono:'DM Mono',monospace;
  --sans:'Braah One',sans-serif;
}
html{font-size:16px;}
html,body{min-height:100vh;background:var(--bg);color:var(--fg);font-family:var(--sans);overflow-x:hidden;}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit;}
::selection{background:var(--accent);color:#0a0b00;}

@keyframes fadeIn{from{opacity:0;transform:translateY(0.75rem)}to{opacity:1;transform:none}}
@keyframes rowIn{from{opacity:0;transform:translateX(-0.375rem)}to{opacity:1;transform:none}}
@keyframes pageIn{from{opacity:0}to{opacity:1}}
@keyframes cardIn{from{opacity:0;transform:translateY(0.5rem)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

.topbar{
  position:sticky;top:0;z-index:100;
  width:100%;
  padding:1.25rem 2.5rem;
  background:linear-gradient(var(--bg) 55%,transparent);
  display:flex;align-items:center;justify-content:center;
}
.tabs{
  display:flex;align-items:center;
  background:var(--s1);
  border:1px solid var(--l2);
  border-radius:0.875rem;
  padding:0.3125rem;
  gap:0.125rem;
}
.tab{
  color:var(--fg4);
  font-size:0.6875rem;
  font-weight:400;
  padding:0.5rem 1.125rem;
  border-radius:0.5625rem;
  transition:color 0.15s,background 0.15s,box-shadow 0.15s;
  letter-spacing:0.05em;
  font-family:var(--mono);
  white-space:nowrap;
  text-transform:uppercase;
  line-height:1;
}
.tab:hover{color:var(--fg2);}
.tab.on{color:var(--fg);background:var(--l2);box-shadow:0 0.0625rem 0.25rem rgba(0,0,0,0.5);}
.tab-dot{
  display:inline-block;width:0.25rem;height:0.25rem;border-radius:50%;
  background:var(--accent);margin-left:0.3125rem;vertical-align:middle;
  opacity:0;animation:pulse 2.5s infinite;transition:opacity 0.15s;
}
.tab.on .tab-dot{opacity:1;}
.tab-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:0.875rem;height:0.875rem;border-radius:6.25rem;
  background:var(--red);color:#fff;
  font-family:var(--mono);font-size:0.5rem;font-weight:500;
  margin-left:0.3125rem;vertical-align:middle;padding:0 0.1875rem;
  opacity:0;transition:opacity 0.2s;
}
.tab-badge.show{opacity:1;}

.wrap{max-width:56.25rem;margin:0 auto;padding:0 2.5rem 8.75rem;}
.page{display:none;}
.page.on{display:block;animation:pageIn 0.2s ease both;}

.hero{padding:4rem 0 5rem;}
.hero-h{
  font-size:clamp(4rem,14vw,8.5rem);
  font-weight:800;
  letter-spacing:-0.055em;
  line-height:0.87;
  animation:fadeIn 0.5s 0.06s ease both;
  color:var(--fg);
  font-family:var(--sans);
}
.hero-h span{color:var(--fg3);}
.hero-cats{display:flex;gap:0.625rem;align-items:center;margin-top:1.25rem;}
.hero-ico{
  display:block;width:1.75rem;height:1.75rem;
  image-rendering:pixelated;opacity:0.32;
  transition:opacity 0.2s;
  animation:fadeIn 0.5s 0.1s ease both;
}
.hero-ico:hover{opacity:0.65;}
.hero-btns{
  display:flex;gap:0.625rem;margin-top:2.25rem;
  animation:fadeIn 0.5s 0.14s ease both;
}
.btn{
  padding:0.6875rem 1.5rem;border-radius:6.25rem;
  font-size:0.6875rem;font-weight:600;
  letter-spacing:0.08em;text-transform:uppercase;
  transition:all 0.15s;font-family:var(--mono);
}
.btn:active{transform:scale(0.96);}
.btn-solid{background:var(--fg);color:var(--bg);}
.btn-solid:hover{background:var(--accent);color:#0a0b00;}
.btn-ghost{background:transparent;color:var(--fg3);border:1px solid var(--l3);}
.btn-ghost:hover{color:var(--fg);border-color:var(--fg3);}

.section-head{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:3.5rem 0 0;margin-bottom:1.5rem;
}
.section-title{font-size:0.6875rem;font-family:var(--mono);letter-spacing:0.2em;text-transform:uppercase;color:var(--fg4);}
.section-count{font-size:0.6875rem;font-family:var(--mono);color:var(--fg4);}
.rule{height:1px;background:var(--l2);}

.script-card{
  position:relative;
  display:flex;align-items:center;gap:1.25rem;
  padding:1.375rem 1.5rem;
  border-bottom:1px solid var(--l2);
  transition:background 0.15s;
  animation:cardIn 0.35s ease both;
  overflow:hidden;
}
.script-card:first-child{border-top:1px solid var(--l2);}
.script-card:nth-child(1){animation-delay:0.04s;}
.script-card:nth-child(2){animation-delay:0.09s;}
.script-card:hover{background:var(--s1);}
.script-num{font-family:var(--mono);font-size:0.5625rem;color:var(--fg4);min-width:1.375rem;flex-shrink:0;letter-spacing:0.05em;}
.script-info{flex:1;min-width:0;}
.script-title{font-size:0.9375rem;font-weight:600;letter-spacing:-0.02em;margin-bottom:0.375rem;}
.online{
  display:inline-flex;align-items:center;gap:0.375rem;
  font-family:var(--mono);font-size:0.5rem;
  letter-spacing:0.2em;text-transform:uppercase;color:var(--accent-dim);
}
.dot{width:0.25rem;height:0.25rem;border-radius:50%;background:var(--accent);animation:pulse 2.5s infinite;}
.sbtns{display:flex;gap:0.5rem;flex-shrink:0;}
.sbtn{
  padding:0.4375rem 0.9375rem;border-radius:6.25rem;
  font-size:0.5625rem;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  transition:all 0.12s;font-family:var(--mono);
}
.sbtn:active{transform:scale(0.95);}
.sbtn-c{background:var(--l2);color:var(--fg3);border:1px solid var(--l3);}
.sbtn-c:hover{background:var(--l3);color:var(--fg);}
.sbtn-c.ok{background:var(--accent);color:#0a0b00;border-color:var(--accent);}
.sbtn-g{background:transparent;color:var(--fg4);border:1px solid var(--l2);}
.sbtn-g:hover{color:var(--fg);border-color:var(--fg3);}

.filters{
  display:flex;gap:0.375rem;padding:1.25rem 0;flex-wrap:wrap;
  border-bottom:1px solid var(--l2);margin-bottom:0.25rem;
}
.f{
  padding:0.3125rem 0.875rem;border-radius:6.25rem;font-size:0.5625rem;
  font-family:var(--mono);
  border:1px solid var(--l2);background:transparent;
  color:var(--fg4);transition:all 0.12s;letter-spacing:0.1em;text-transform:uppercase;
}
.f:hover{color:var(--fg3);border-color:var(--l3);}
.f.on{background:var(--fg);color:var(--bg);border-color:var(--fg);}

.etable{width:100%;border-collapse:collapse;}
.etable th{
  font-family:var(--mono);font-size:0.5rem;letter-spacing:0.25em;
  text-transform:uppercase;color:var(--fg4);
  padding:0.875rem 0;border-bottom:1px solid var(--l2);
  text-align:left;font-weight:400;
}
.etable td{
  padding:0.875rem 0;border-bottom:1px solid var(--l1);
  font-size:0.8125rem;vertical-align:middle;
}
.etable tbody tr{opacity:0;animation:rowIn 0.2s ease forwards;}
.en{font-weight:600;letter-spacing:-0.015em;margin-bottom:0.125rem;}
.esub{font-family:var(--mono);font-size:0.5625rem;color:var(--fg4);margin-top:0.125rem;}

.chip{
  display:inline-flex;align-items:center;
  padding:0.125rem 0.5rem;border-radius:6.25rem;
  font-family:var(--mono);font-size:0.5rem;font-weight:500;
  letter-spacing:0.08em;text-transform:uppercase;
}
.cf{background:rgba(61,214,140,0.08);color:var(--green);}
.cp{background:rgba(232,168,32,0.08);color:var(--amber);}
.cs{background:rgba(200,245,60,0.06);color:var(--accent-dim);}
.cd{background:rgba(245,67,42,0.08);color:var(--red);}
.cu{background:rgba(74,143,239,0.08);color:var(--blue);}
.co{background:rgba(245,67,42,0.08);color:var(--red);}
.unc{font-family:var(--mono);font-size:0.625rem;color:var(--fg3);}
.unc b{color:var(--fg);font-weight:500;}

.plat-icon{width:0.8125rem;height:0.8125rem;object-fit:contain;opacity:0.45;vertical-align:middle;margin-right:0.3125rem;}

.vgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--l2);border:1px solid var(--l2);border-radius:0.625rem;overflow:hidden;margin-top:1.25rem;}
.vcard{background:var(--s1);padding:1.375rem;animation:cardIn 0.3s ease both;}
.vcard:nth-child(2){animation-delay:0.06s;}
.vcard:nth-child(3){animation-delay:0.12s;}
.vcard-h{font-family:var(--mono);font-size:0.5rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--fg4);margin-bottom:1.125rem;}
.vrow{display:flex;justify-content:space-between;align-items:flex-start;padding:0.625rem 0;border-bottom:1px solid var(--l1);}
.vrow:last-child{border-bottom:none;}
.vplat{font-size:0.8125rem;font-weight:600;letter-spacing:-0.01em;}
.vdate{font-family:var(--mono);font-size:0.5rem;color:var(--fg4);margin-top:0.1875rem;}
.vver{font-family:var(--mono);font-size:0.5rem;color:var(--fg3);text-align:right;max-width:10rem;word-break:break-all;line-height:1.5;}

.notif-section-label{
  font-family:var(--mono);font-size:0.5rem;letter-spacing:0.3em;
  text-transform:uppercase;color:var(--fg4);padding:1.75rem 0 0.75rem;
}
.notif{
  display:flex;align-items:flex-start;gap:1rem;
  padding:1.125rem 0;
  border-bottom:1px solid var(--l1);
  transition:transform 0.15s;
  animation:cardIn 0.3s ease both;
}
.notif:hover{transform:translateX(0.1875rem);}
.notif:first-of-type{border-top:1px solid var(--l2);}
.notif-icon{
  width:2rem;height:2rem;border-radius:0.5rem;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:0.125rem;border:1px solid var(--l2);
}
.notif-icon img{width:0.875rem;height:0.875rem;object-fit:contain;opacity:0.7;}
.ni-update{background:rgba(74,143,239,0.06);}
.ni-detected{background:rgba(245,67,42,0.06);}
.ni-roblox{background:rgba(232,168,32,0.06);}
.notif-body{flex:1;}
.notif-title{font-size:0.8125rem;font-weight:600;letter-spacing:-0.01em;margin-bottom:0.3125rem;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.notif-sub{font-family:var(--mono);font-size:0.5rem;color:var(--fg4);letter-spacing:0.06em;}
.notif-time{font-family:var(--mono);font-size:0.5rem;color:var(--fg4);flex-shrink:0;margin-top:0.25rem;}
.notif-tag{font-family:var(--mono);font-size:0.4375rem;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;padding:0.125rem 0.4375rem;border-radius:6.25rem;}
.nt-update{background:rgba(74,143,239,0.08);color:var(--blue);}
.nt-detected{background:rgba(245,67,42,0.08);color:var(--red);}
.nt-roblox{background:rgba(232,168,32,0.08);color:var(--amber);}

.msg{padding:3.5rem 0;text-align:center;font-family:var(--mono);font-size:0.5625rem;color:var(--fg4);letter-spacing:0.1em;}
.merr{color:var(--red);}

.toast{
  position:fixed;bottom:1.75rem;left:50%;
  transform:translateX(-50%) translateY(0.75rem) scale(0.96);
  background:var(--accent);color:#0a0b00;
  font-family:var(--mono);font-size:0.5rem;font-weight:500;
  letter-spacing:0.25em;text-transform:uppercase;
  padding:0.625rem 1.375rem;border-radius:6.25rem;z-index:9999;pointer-events:none;
  opacity:0;transition:all 0.2s cubic-bezier(0.34,1.4,0.64,1);
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}

@media(max-width:40rem){
  .wrap{padding:0 1.25rem 5rem;}
  .topbar{padding:1rem 1.25rem;}
  .hero-h{font-size:clamp(3rem,18vw,5rem);}
  .vgrid{grid-template-columns:1fr;}
  .tab{padding:0.4375rem 0.75rem;font-size:0.625rem;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="tabs">
    <button class="tab on" onclick="go('home',this)">Home<span class="tab-dot"></span></button>
    <button class="tab" onclick="go('scripts',this)">Scripts</button>
    <button class="tab" onclick="go('executors',this)">Executors</button>
    <button class="tab" onclick="go('roblox',this)">Roblox</button>
    <button class="tab" id="notif-tab" onclick="go('notifications',this)">Inbox<span class="tab-badge" id="notif-badge"></span></button>
  </div>
</div>

<div class="wrap">

  <div id="home" class="page on">
    <div class="hero">
      <h1 class="hero-h">dope<span>.</span></h1>
      <div class="hero-cats">
        <img src="kitty.jpg" class="hero-ico" alt="">
        <img src="catem.png" class="hero-ico" alt="">
      </div>
      <div class="hero-btns">
        <button class="btn btn-solid" onclick="go('scripts',document.querySelectorAll('.tab')[1])">View Scripts</button>
        <button class="btn btn-ghost" onclick="go('executors',document.querySelectorAll('.tab')[2])">Executors</button>
      </div>
    </div>
  </div>

  <div id="scripts" class="page">
    <div class="section-head">
      <span class="section-title">Scripts</span>
      <span class="section-count">2 available</span>
    </div>
    <div class="rule"></div>
    <div class="script-card">
      <div class="script-num">01</div>
      <div class="script-info">
        <div class="script-title">Murder Drones RP</div>
        <span class="online"><span class="dot"></span>Online</span>
      </div>
      <div class="sbtns">
        <button class="sbtn sbtn-c" onclick="cp(this,'loadstring(game:HttpGet(&quot;https://dopescripts.vercel.app/murderdronesrp.lua&quot;))()')">Copy</button>
        <button class="sbtn sbtn-g" onclick="window.open('https://www.roblox.com/games/11451679682','_blank')">Game ↗</button>
      </div>
    </div>
    <div class="script-card">
      <div class="script-num">02</div>
      <div class="script-info">
        <div class="script-title">Eat Jelly For Brainrots</div>
        <span class="online"><span class="dot"></span>Online</span>
      </div>
      <div class="sbtns">
        <button class="sbtn sbtn-c" onclick="cp(this,'loadstring(game:HttpGet(&quot;https://dopescripts.vercel.app/eatjellyforbrainrots.lua&quot;))()')">Copy</button>
        <button class="sbtn sbtn-g" onclick="window.open('https://www.roblox.com/games/96169782836983','_blank')">Game ↗</button>
      </div>
    </div>
  </div>

  <div id="executors" class="page">
    <div class="section-head">
      <span class="section-title">Executors</span>
      <span class="section-count">Live</span>
    </div>
    <div class="filters">
      <button class="f on" onclick="filt('all',this)">All</button>
      <button class="f" onclick="filt('free',this)">Free</button>
      <button class="f" onclick="filt('paid',this)">Paid</button>
      <button class="f" onclick="filt('undetected',this)">Undetected</button>
      <button class="f" onclick="filt('updated',this)">Updated</button>
    </div>
    <table class="etable">
      <thead>
        <tr>
          <th style="width:1.75rem">#</th>
          <th>Name</th>
          <th style="width:4.375rem">Price</th>
          <th style="width:5rem">Detection</th>
          <th style="width:5rem">Status</th>
          <th style="width:3.75rem">UNC</th>
        </tr>
      </thead>
      <tbody id="exec-body"><tr><td colspan="6"><div class="msg">Fetching...</div></td></tr></tbody>
    </table>
  </div>

  <div id="roblox" class="page">
    <div class="section-head">
      <span class="section-title">Roblox Versions</span>
      <span class="section-count">Live</span>
    </div>
    <div class="rule"></div>
    <div id="rbx-body"><div class="msg">Fetching...</div></div>
  </div>

  <div id="notifications" class="page">
    <div class="section-head">
      <span class="section-title">Inbox</span>
      <span class="section-count" id="notif-count">Loading...</span>
    </div>
    <div id="notif-body"><div class="msg">Fetching...</div></div>
  </div>

</div>

<div class="toast" id="toast">Copied</div>

<script>
const PLAT_ICONS={Windows:'win.png',Mac:'mac.png',Android:'android.png',iOS:'ios.png'};
function platIcon(name){const s=PLAT_ICONS[name];if(!s)return'';return`<img src="${s}" class="plat-icon" alt="${name}">`;}

function go(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  if(btn)btn.classList.add('on');
  if(id==='executors'&&!execLoaded)loadExecs();
  if(id==='roblox'&&!rbxLoaded)loadRbx();
  if(id==='notifications'){
    const badge=document.getElementById('notif-badge');
    badge.textContent='';badge.classList.remove('show');
    if(!notifLoaded)loadNotifs();
  }
}

function cp(btn,text){
  const s=text.replace(/&quot;/g,'"');
  navigator.clipboard?navigator.clipboard.writeText(s).catch(()=>fb(s)):fb(s);
  btn.textContent='Copied';btn.classList.add('ok');
  const t=document.getElementById('toast');t.classList.add('show');
  setTimeout(()=>{t.classList.remove('show');btn.textContent='Copy';btn.classList.remove('ok');},1800);
}
function fb(s){const ta=document.createElement('textarea');ta.value=s;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}

let execData=[],execLoaded=false,curFilt='all';

async function loadExecs(){
  execLoaded=true;
  try{
    const r=await fetch('https://weao.xyz/api/status/exploits',{headers:{'User-Agent':'WEAO-3PService'}});
    if(!r.ok)throw new Error('HTTP '+r.status);
    execData=await r.json();
    renderExecs();
    buildNotifs();
  }catch(e){
    document.getElementById('exec-body').innerHTML=`<tr><td colspan="6"><div class="msg merr">Failed — ${e.message}</div></td></tr>`;
  }
}

function renderExecs(){
  let d=[...execData];
  if(curFilt==='free')d=d.filter(e=>e.free);
  if(curFilt==='paid')d=d.filter(e=>!e.free);
  if(curFilt==='undetected')d=d.filter(e=>!e.detected);
  if(curFilt==='updated')d=d.filter(e=>e.updateStatus);
  if(!d.length){document.getElementById('exec-body').innerHTML='<tr><td colspan="6"><div class="msg">No results.</div></td></tr>';return;}
  document.getElementById('exec-body').innerHTML=d.map((e,i)=>`
    <tr style="animation-delay:${i*0.015}s">
      <td style="font-family:var(--mono);font-size:0.5625rem;color:var(--fg4)">${i+1}</td>
      <td>
        <div class="en">${e.title}</div>
        <div class="esub">${e.platform?`${platIcon(e.platform)}${e.platform}`:''}${e.version?` · ${e.version}`:''}</div>
      </td>
      <td>${e.free?'<span class="chip cf">Free</span>':`<span class="chip cp">${e.cost||'Paid'}</span>`}</td>
      <td>${e.detected?'<span class="chip cd">Detected</span>':'<span class="chip cs">Safe</span>'}</td>
      <td>${e.updateStatus?'<span class="chip cu">Updated</span>':'<span class="chip co">Outdated</span>'}</td>
      <td class="unc">${e.uncPercentage!=null?`<b>${e.uncPercentage}</b>%`:'—'}</td>
    </tr>`).join('');
}

function filt(f,btn){
  curFilt=f;
  document.querySelectorAll('.f').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(execLoaded&&execData.length)renderExecs();
}

let rbxLoaded=false,rbxData=null;

async function loadRbx(){
  rbxLoaded=true;
  try{
    const[cur,fut,past]=await Promise.all([
      fetch('https://weao.xyz/api/versions/current',{headers:{'User-Agent':'WEAO-3PService'}}).then(r=>r.json()),
      fetch('https://weao.xyz/api/versions/future',{headers:{'User-Agent':'WEAO-3PService'}}).then(r=>r.json()),
      fetch('https://weao.xyz/api/versions/past',{headers:{'User-Agent':'WEAO-3PService'}}).then(r=>r.json()),
    ]);
    rbxData={cur,fut,past};
    document.getElementById('rbx-body').innerHTML=`<div class="vgrid">
      ${vc('Current',[['Windows',cur.Windows,cur.WindowsDate],['Mac',cur.Mac,cur.MacDate],['Android',cur.Android,cur.AndroidDate],['iOS',cur.iOS,cur.iOSDate]])}
      ${vc('Future',[['Windows',fut.Windows,fut.WindowsDate],['Mac',fut.Mac,fut.MacDate]])}
      ${vc('Past',[['Windows',past.Windows,past.WindowsDate],['Mac',past.Mac,past.MacDate]])}
    </div>`;
    buildNotifs();
  }catch(e){
    document.getElementById('rbx-body').innerHTML=`<div class="msg merr">Failed — ${e.message}</div>`;
  }
}

function vc(t,rows){
  return`<div class="vcard"><div class="vcard-h">${t}</div>${rows.map(([p,v,d])=>`
    <div class="vrow">
      <div><div class="vplat">${platIcon(p)}${p}</div><div class="vdate">${d||'—'}</div></div>
      <div class="vver">${v||'—'}</div>
    </div>`).join('')}</div>`;
}

let notifLoaded=false;

window.addEventListener('load',()=>{
  if(!execLoaded)loadExecs();
  if(!rbxLoaded)loadRbx();
});

function buildNotifs(){
  const hasExec=execLoaded&&execData.length>0;
  const hasRbx=rbxLoaded&&rbxData;
  if(!hasExec&&!hasRbx)return;
  const notifs=[];
  if(hasExec){
    execData.filter(e=>e.detected).forEach(e=>{
      notifs.push({type:'detected',iconSrc:'win.png',iconClass:'ni-detected',tag:'Detected',tagClass:'nt-detected',title:e.title,sub:`Flagged · ${e.platform||'Unknown'}`,time:'Live',category:'executor'});
    });
    execData.filter(e=>e.updateStatus).forEach(e=>{
      notifs.push({type:'update',iconSrc:PLAT_ICONS[e.platform]||null,iconClass:'ni-update',tag:'Updated',tagClass:'nt-update',title:e.title,sub:`${e.version||'Latest'} · ${e.platform||'Unknown'}`,time:'Live',category:'executor'});
    });
  }
  if(hasRbx){
    const{cur,fut}=rbxData;
    if(cur.Windows)notifs.push({type:'roblox',iconSrc:'win.png',iconClass:'ni-roblox',tag:'Roblox',tagClass:'nt-roblox',title:'Windows Client',sub:`${cur.Windows} · ${cur.WindowsDate||'—'}`,time:'Live',category:'roblox'});
    if(cur.Mac)notifs.push({type:'roblox',iconSrc:'mac.png',iconClass:'ni-roblox',tag:'Roblox',tagClass:'nt-roblox',title:'Mac Client',sub:`${cur.Mac} · ${cur.MacDate||'—'}`,time:'Live',category:'roblox'});
    if(fut.Windows)notifs.push({type:'update',iconSrc:'win.png',iconClass:'ni-update',tag:'Incoming',tagClass:'nt-update',title:'Future Windows Build',sub:`${fut.Windows} · ${fut.WindowsDate||'—'}`,time:'Live',category:'roblox'});
  }
  if(!notifs.length){
    document.getElementById('notif-body').innerHTML='<div class="msg">Nothing here yet.</div>';
    document.getElementById('notif-count').textContent='0 items';
    return;
  }
  const badge=document.getElementById('notif-badge');
  const detected=notifs.filter(n=>n.type==='detected').length;
  if(detected>0){badge.textContent=detected;badge.classList.add('show');}
  document.getElementById('notif-count').textContent=`${notifs.length} items`;
  const rbxNotifs=notifs.filter(n=>n.category==='roblox');
  const execNotifs=notifs.filter(n=>n.category==='executor');
  let html='';
  if(rbxNotifs.length){html+=`<div class="notif-section-label">Roblox</div>`;rbxNotifs.forEach((n,i)=>{html+=notifRow(n,i);});}
  if(execNotifs.length){html+=`<div class="notif-section-label">Executors</div>`;execNotifs.forEach((n,i)=>{html+=notifRow(n,i+rbxNotifs.length);});}
  document.getElementById('notif-body').innerHTML=html;
  notifLoaded=true;
}

function notifRow(n,i){
  const iconContent=n.iconSrc?`<img src="${n.iconSrc}" alt="" style="width:0.875rem;height:0.875rem;object-fit:contain;opacity:0.6;">`:'';
  return`<div class="notif" style="animation-delay:${i*0.03}s">
    <div class="notif-icon ${n.iconClass}">${iconContent}</div>
    <div class="notif-body">
      <div class="notif-title">${n.title}<span class="notif-tag ${n.tagClass}">${n.tag}</span></div>
      <div class="notif-sub">${n.sub}</div>
    </div>
    <div class="notif-time">${n.time}</div>
  </div>`;
}

function loadNotifs(){
  notifLoaded=true;
  if(execLoaded&&rbxLoaded){buildNotifs();}
  else{
    document.getElementById('notif-body').innerHTML='<div class="msg">Fetching...</div>';
    const check=setInterval(()=>{if(execLoaded&&rbxLoaded){clearInterval(check);buildNotifs();}},400);
  }
}
</script>
</body>
</html>
