<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>403 | dope</title>
<link rel="icon" type="image/x-icon" href="lulwut.ico">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  min-height:100vh;
  font-family:'Geist',sans-serif;
  overflow:auto;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#080808;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(22px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  from{opacity:0}to{opacity:1}
}
@keyframes float{
  0%,100%{transform:translateY(0px)}
  50%{transform:translateY(-8px)}
}

.wrap{
  text-align:center;
  display:flex;flex-direction:column;
  align-items:center;
  padding:40px 24px;
}

.num{
  font-family:'Geist',sans-serif;
  font-size:clamp(80px, 22vw, 160px);
  font-weight:900;
  letter-spacing:-0.07em;
  line-height:1.05;
  background:linear-gradient(to bottom, #ffffff 0%, #888888 50%, #111111 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  display:inline-block;
  padding:0 8px;
  animation:fadeUp 0.6s 0.05s cubic-bezier(0.22,1,0.36,1) both;
}

.sub{
  font-size:14px;font-weight:500;
  color:#555;
  letter-spacing:-0.01em;
  margin-top:8px;
  animation:fadeUp 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) both;
}

.cat{
  width:88px;height:88px;
  image-rendering:pixelated;
  margin-top:32px;
  animation:
    fadeIn 0.5s 0.3s both,
    float 3s 0.8s ease-in-out infinite;
}

.smile{
  font-family:'Geist Mono',monospace;
  font-size:13px;
  color:#444;
  margin-top:14px;
  animation:fadeUp 0.6s 0.4s cubic-bezier(0.22,1,0.36,1) both;
}

.back{
  display:inline-flex;align-items:center;gap:7px;
  margin-top:28px;
  padding:9px 20px;border-radius:8px;
  background:transparent;
  border:1px solid #1a1a1a;
  font-size:11px;font-weight:600;
  color:#555;
  letter-spacing:0.01em;
  cursor:pointer;
  font-family:'Geist',sans-serif;
  transition:all 0.18s;
  text-decoration:none;
  animation:fadeUp 0.6s 0.5s cubic-bezier(0.22,1,0.36,1) both;
}
.back:hover{color:#f0f0f0;border-color:#333;}
.back:active{transform:scale(0.97);}
</style>
</head>
<body>
<div class="wrap">
  <div class="num">403</div>
  <div class="sub">you're not allowed to see this</div>
  <img class="cat" src="dancing-cat-cat.gif" alt="dancing cat">
  <div class="smile">:)</div>
  <a class="back" href="/">← go home</a>
</div>
</body>
</html>
